name: Multi-Architecture Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest --tb=short -q

  # Build for both architectures × both Python versions
  build:
    needs: quality
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        python-version: ["3.12", "3.13", "3.14"]
    uses: ./.github/workflows/build-linux.yml
    with:
      arch: ${{ matrix.arch }}
      python-version: ${{ matrix.python-version }}

  # Publish release
  publish-release:
    needs: build
    runs-on: ubuntu-22.04
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets/
          # De-duplicate the voicechanger wheel (same py3-none-any from every arch)
          find artifacts -name 'voicechanger-*.whl' | head -1 | xargs -I{} cp {} release-assets/
          # Per-arch pedalboard wheels
          find artifacts -name 'pedalboard-*.whl' -exec cp {} release-assets/ \;
          # Per-arch .deb packages
          find artifacts -name '*.deb' -exec cp {} release-assets/ \;
          # Patch for anyone building from source
          cp native/patches/0001-add-LivePitchShift.patch release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)
          echo "Release assets:"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## Artifacts

            | File | Description |
            |------|-------------|
            | `voicechanger-*.whl` | Pure-Python wheel (all platforms) |
            | `pedalboard-*cp312*_x86_64.whl` | Patched pedalboard for Python 3.12 (x86_64) |
            | `pedalboard-*cp312*_aarch64.whl` | Patched pedalboard for Python 3.12 (aarch64 / Pi) |
            | `pedalboard-*cp313*_x86_64.whl` | Patched pedalboard for Python 3.13 (x86_64) |
            | `pedalboard-*cp313*_aarch64.whl` | Patched pedalboard for Python 3.13 (aarch64 / Pi) |
            | `pedalboard-*cp314*_x86_64.whl` | Patched pedalboard for Python 3.14 (x86_64) |
            | `pedalboard-*cp314*_aarch64.whl` | Patched pedalboard for Python 3.14 (aarch64 / Pi) |
            | `voicechanger_*_<arch>.deb` | All-in-one Debian package (Pi or Ubuntu) |

            ## Installation

            ### Raspberry Pi / Debian (recommended):
            \`\`\`bash
            sudo dpkg -i voicechanger_*_arm64.deb
            \`\`\`

            ### Via pip (any Linux):
            \`\`\`bash
            pip install voicechanger-*.whl pedalboard-*$(uname -m)*.whl
            \`\`\`

            ### Verification
            \`\`\`bash
            sha256sum -c SHA256SUMS
            \`\`\`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
