name: Release

on:
  push:
    branches: [main]

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    needs: quality
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        python-version: ["3.12", "3.13", "3.14"]
    uses: ./.github/workflows/build-linux.yml
    with:
      arch: ${{ matrix.arch }}
      python-version: ${{ matrix.python-version }}

  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets/
          find artifacts -name 'voicechanger-*.whl' | head -1 | xargs -I{} cp {} release-assets/
          find artifacts -name 'pedalboard-*.whl' -exec cp {} release-assets/ \;
          find artifacts -name '*.deb' -exec cp {} release-assets/ \;
          cp native/patches/0001-add-LivePitchShift.patch release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## Artifacts

            | File | Description |
            |------|-------------|
            | `voicechanger-*.whl` | Pure-Python wheel (all platforms) |
            | `pedalboard-*_x86_64.whl` | Patched pedalboard wheels (x86_64) |
            | `pedalboard-*_aarch64.whl` | Patched pedalboard wheels (aarch64 / Pi) |
            | `voicechanger_*_<arch>.deb` | All-in-one Debian package |

            Both `.deb` packages include the Flutter web runtime for
            headless / Raspberry Pi web-server GUI mode. Native desktop
            mode is used automatically when a display server is available.

            ## Installation

            ### Raspberry Pi / Debian:
            ```bash
            sudo dpkg -i voicechanger_*_arm64.deb
            ```

            ### Via pip:
            ```bash
            pip install voicechanger-*.whl pedalboard-*$(uname -m)*.whl
            ```

            ### Verification
            ```bash
            sha256sum -c SHA256SUMS
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
