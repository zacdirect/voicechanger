name: Multi-Architecture Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest --tb=short -q

  # Build for all three architectures using the reusable workflow
  build:
    needs: quality
    strategy:
      matrix:
        arch: [x86_64, aarch64, armv7l]
    uses: ./.github/workflows/build-linux.yml
    with:
      arch: ${{ matrix.arch }}

  # Publish release
  publish-release:
    needs: build
    runs-on: ubuntu-22.04
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python for version bump
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets/
          find artifacts -type f \( -name '*.whl' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          cp native/patches/0001-add-LivePitchShift.patch release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)
          ls -lh release-assets/

      - name: Bump version
        run: |
          python scripts/release/version-bump.py --bump patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.sha }}
          files: release-assets/*
          body: |
            # Voicechanger Release

            Multi-architecture release including:
            - Wheels for x86_64, aarch64, armv7l
            - Debian packages (when available)
            - Pedalboard patch (`0001-add-LivePitchShift.patch`)
            - SHA256 checksums

            ## Installation

            ### Via pip:
            \`\`\`bash
            pip install voicechanger-*.whl
            \`\`\`

            ### Via deb (Debian/Ubuntu/Raspberry Pi OS):
            \`\`\`bash
            sudo dpkg -i voicechanger_*.deb
            \`\`\`

            ### CLI after installation:
            \`\`\`bash
            voicechanger list-devices
            voicechanger set-device input <device-id>
            voicechanger gui
            \`\`\`

            ## Verification
            \`\`\`bash
            sha256sum -c SHA256SUMS
            \`\`\`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
