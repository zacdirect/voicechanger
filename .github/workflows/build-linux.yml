name: Build Linux Artifacts

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
        description: "Target architecture: x86_64 or aarch64"
      python-version:
        required: true
        type: string
        description: "Python version to build against (e.g. 3.12, 3.14)"

jobs:
  build:
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install host tools
        run: |
          python -m pip install --upgrade pip
          pip install build
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install fpm

      # ── voicechanger wheel (pure Python, arch-independent) ──
      - name: Build voicechanger wheel
        run: |
          python -m build --wheel --outdir dist/
          ls -lh dist/

      - name: Verify CLI entry points
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path
          wheel = next(Path('dist').glob('voicechanger-*.whl'))
          with zipfile.ZipFile(wheel) as zf:
              ep = [n for n in zf.namelist() if n.endswith('entry_points.txt')]
              if not ep:
                  raise SystemExit('entry_points.txt missing')
              content = zf.read(ep[0]).decode()
              assert 'voicechanger =' in content, 'voicechanger entry point missing'
              assert 'voicechanger-gui =' in content, 'voicechanger-gui entry point missing'
          print('entry points verified')
          PY

      # ── Patched pedalboard wheel (native, per-architecture) ──
      - name: Apply LivePitchShift patch to pedalboard
        run: |
          cd vendor/pedalboard
          git apply ../../native/patches/0001-add-LivePitchShift.patch
          echo "Patch applied successfully"

      - name: Build patched pedalboard wheel
        run: |
          sudo apt-get install -y libsndfile1-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxrender-dev libxcomposite-dev \
            libxcursor-dev libfreetype-dev libasound2-dev
          cd vendor/pedalboard
          pip install scikit-build-core pybind11
          pip wheel . --no-deps --wheel-dir ../../dist/
          echo "Pedalboard wheel built:"
          ls -lh ../../dist/pedalboard-*.whl

      # ── Download transitive dependencies so the .deb is fully offline ──
      - name: Download dependency wheels
        run: |
          pip download --dest dist/ --find-links dist/ \
            --only-binary :all: \
            numpy flet flet-web fastapi "uvicorn[standard]" sounddevice
          echo "All wheels in dist/:"
          ls -lh dist/*.whl

      # ── Pre-install all packages into a lib directory for the .deb ──
      - name: Install packages into lib tree
        run: |
          pip install --target dist/lib --find-links dist/ --no-deps dist/*.whl
          echo "Installed packages:"
          ls dist/lib/

      # ── Debian package (bundles pre-installed lib + systemd service) ──
      - name: Build .deb package
        run: |
          chmod +x scripts/release/build-deb.sh
          scripts/release/build-deb.sh "${{ inputs.arch }}" "${{ inputs.python-version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ inputs.arch }}-py${{ inputs.python-version }}
          path: |
            dist/*.whl
            dist/*.deb
