name: Build Linux Artifacts

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Verify pedalboard patch exists
        run: |
          test -f native/patches/0001-add-LivePitchShift.patch
          echo "Pedalboard patch present"

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist
          ls -lah dist

      - name: Verify CLI entry points in built wheel
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path
          wheel = next(Path('dist').glob('*.whl'))
          with zipfile.ZipFile(wheel) as zf:
              ep = [n for n in zf.namelist() if n.endswith('entry_points.txt')]
              if not ep:
                  raise SystemExit('entry_points.txt missing')
              content = zf.read(ep[0]).decode()
              assert 'voicechanger =' in content, 'voicechanger entry point missing'
              assert 'voicechanger-gui =' in content, 'voicechanger-gui entry point missing'
          print('entry points verified')
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ inputs.arch }}
          path: dist/*.whl

      - name: Build deb artifact (best effort)
        run: |
          chmod +x scripts/release/build-deb.sh
          scripts/release/build-deb.sh "${{ inputs.arch }}" dist || true

      - name: Upload deb artifact if present
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ inputs.arch }}
          path: dist/*.deb
          if-no-files-found: ignore
